<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>工具设置</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="settings-page">
  <main class="settings-main">
    <header>
      <div>
        <strong>工具设置</strong>
        <span>公众号文章数据助手 - 分享版</span>
      </div>
      <button id="saveSettings" class="primary">保存设置</button>
    </header>

    <section class="card">
      <h2>密钥</h2>
      <div class="grid">
        <label>AppID<input id="appid" type="text" placeholder="请输入公众号 AppID"></label>
        <label>AppSecret<input id="appsecret" type="password" placeholder="请输入公众号 AppSecret"></label>
      </div>
      <p class="subtle">密钥只保存在当前浏览器的插件存储里。分享插件时不会包含你的密钥。</p>
    </section>

    <section class="card">
      <h2>导出设置</h2>
      <div class="grid">
        <label>数据接口
          <select id="mode">
            <option value="totaldetail">新接口：发表内容详细数据（推荐）</option>
            <option value="legacy-summary">旧接口：图文群发每日数据</option>
            <option value="legacy-total">旧接口：图文群发总数据</option>
          </select>
        </label>
        <label>运营简表口径
          <select id="rowMode">
            <option value="latest">每篇文章一行：取最后统计日累计值</option>
            <option value="daily">保留每日累计明细</option>
          </select>
        </label>
      </div>
    </section>

    <section class="card">
      <h2>字段与列顺序</h2>
      <div id="fieldPicker" class="field-picker"></div>
      <div class="order-panel">
        <select id="fieldOrder" size="9"></select>
        <div class="order-actions">
          <button id="moveUp" type="button">上移</button>
          <button id="moveDown" type="button">下移</button>
          <button id="resetFields" type="button">恢复默认</button>
        </div>
      </div>
    </section>

    <section class="status-card">
      <div class="status-title">保存状态</div>
      <div id="message" class="status-window">等待保存...</div>
    </section>
  </main>
  <script src="common.js"></script>
  <script src="settings.js"></script>
</body>
</html>
